version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: defect_user
      POSTGRES_PASSWORD: defect_pass
      POSTGRES_DB: defect_detection
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defect_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-change_this_in_production_min_32_chars}
      DATABASE_URL: postgresql://defect_user:defect_pass@db:5432/defect_detection
      ALLOWED_ORIGINS: http://localhost,http://localhost:3000
      YOLO_WEIGHTS_PATH: storage/weights/best.pt
      CONFIDENCE_THRESHOLD: "0.4"
    volumes:
      - backend_storage:/app/storage
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  backend_storage:
