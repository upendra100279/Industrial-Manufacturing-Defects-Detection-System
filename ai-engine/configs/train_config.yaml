model:
  base_weights: yolov8n.pt
  image_size: 640

dataset:
  root: ../data/processed/mvtec_yolo
  data_yaml: ../data/processed/mvtec_yolo/data.yaml

training:
  epochs: 100
  batch_size: 16
  patience: 20
  lr0: 0.01
  device: 0
  project: ../runs
  name: defect_detector_v1

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  fliplr: 0.5
  mosaic: 1.0
